openapi: 3.0.0
info:
  title: RealEstate Management API
  version: 1.0.0
  description: |
    Complete backend API for real estate management.

    **Roles & Permissions Overview**:
    - **SUPER-ADMIN** (first admin, managedById = null): full access to everything
    - **SUB-ADMIN** (admin with managedById set): restricted to landlords/tenants they manage
    - **LANDLORD**: own properties/units, create/assign tenants to own units
    - **TENANT**: view own unit, invoices, payments, bookings, dashboard

    **Security**: Most endpoints require Bearer JWT token (Authorization: Bearer <token>).
    Public endpoints: /auth/registry (for LANDLORD/TENANT), /auth/login

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server

paths:
  /auth/registry:
    post:
      summary: Register new user (public for LANDLORD/TENANT, protected for ADMIN)
      description: |
        - TENANT & LANDLORD: no token required.
        - ADMIN: token required if at least one admin already exists (first admin is free).
        - Validates name, email, password, role (enum).
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name: { type: string, minLength: 1 }
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                role: { type: string, enum: [ADMIN, LANDLORD, TENANT] }
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    { type: string, example: "User created successfully" }
                  data:
                    type: object
                    properties:
                      id: { type: integer }
                      name: { type: string }
                      email: { type: string }
                      role: { type: string }
                      token: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/InternalError" }

  /auth/login:
    post:
      summary: Login user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    { type: string, example: "User logged in successfully" }
                  data:
                    type: object
                    properties:
                      id: { type: integer }
                      email: { type: string }
                      role: { type: string }
                      token: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/InternalError" }

  /users:
    get:
      summary: List all users (Admin only)
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema: { type: string, enum: [ADMIN, LANDLORD, TENANT] }
        - name: email
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/User" },
                    }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /users/{id}:
    put:
      summary: Update user by ID (Admin only)
      description: Can update name, email, password, managedById (for landlords), unitId (for tenants), etc.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                managedById:
                  { type: integer, description: "Only for LANDLORD role" }
                unitId: { type: integer, description: "Only for TENANT role" }
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/InternalError" }

  /properties:
    post:
      summary: Create property (ADMIN/LANDLORD)
      tags:
        - Properties
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, location, categoryId]
              properties:
                name: { type: string }
                location: { type: string }
                categoryId: { type: integer }
                description: { type: string }
      responses:
        "201": { $ref: "#/components/responses/PropertyCreated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/InternalError" }

    get:
      summary: List properties (ADMIN/LANDLORD)
      tags:
        - Properties
      security:
        - bearerAuth: []
      parameters:
        - name: location
          in: query
          schema: { type: string }
        - name: categoryId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Properties list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/Property" },
                    }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /properties/{id}:
    put:
      summary: Update property (ADMIN/LANDLORD)
      tags:
        - Properties
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                location: { type: string }
                categoryId: { type: integer }
                description: { type: string }
      responses:
        "200": { $ref: "#/components/responses/PropertyUpdated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/InternalError" }

    delete:
      summary: Delete property (ADMIN/LANDLORD)
      tags:
        - Properties
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Property deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    { type: string, example: "Property deleted successfully" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /units:
    post:
      summary: Create unit (ADMIN/LANDLORD)
      tags:
        - Units
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price, propertyId, status]
              properties:
                name: { type: string }
                price: { type: number }
                propertyId: { type: integer }
                status: { type: string, enum: [available, occupied] }
                size: { type: string }
                description: { type: string }
      responses:
        "201": { $ref: "#/components/responses/UnitCreated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/InternalError" }

    get:
      summary: List units (ADMIN/LANDLORD)
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: propertyId
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema: { type: string, enum: [available, occupied] }
      responses:
        "200":
          description: Units list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/Unit" },
                    }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /units/{id}:
    put:
      summary: Update unit (ADMIN/LANDLORD)
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                price: { type: number }
                status: { type: string, enum: [available, occupied] }
                size: { type: string }
                description: { type: string }
      responses:
        "200": { $ref: "#/components/responses/UnitUpdated" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/InternalError" }

    delete:
      summary: Delete unit (ADMIN/LANDLORD)
      tags:
        - Units
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Unit deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    { type: string, example: "Unit deleted successfully" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /landlords:
    get:
      summary: List landlords
      description: |
        - Super-admin: all landlords
        - Sub-admin: only landlords with managedById = sub-admin.id
        - Landlord: only self
      tags:
        - Landlords
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Landlords list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/User" },
                    }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /landlords/{id}:
    get:
      summary: Get landlord by ID
      tags:
        - Landlords
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Landlord details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /landlords/dashboard:
    get:
      summary: Landlord dashboard (properties count, units count, etc.)
      tags:
        - Landlords
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      properties: { type: array }
                      propertiesCount: { type: integer }
                      unitsCount: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /tenants:
    post:
      summary: Create tenant (ADMIN/LANDLORD)
      tags:
        - Tenants
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 6 }
                unitId: { type: integer, description: Required for landlords }
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "500": { $ref: "#/components/responses/InternalError" }

    get:
      summary: List tenants (ADMIN/LANDLORD)
      tags:
        - Tenants
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenants list
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/User" },
                    }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /tenants/{id}:
    get:
      summary: Get tenant by ID (ADMIN/LANDLORD)
      tags:
        - Tenants
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /tenants/{id}/assign-unit:
    put:
      summary: Assign tenant to unit (ADMIN/LANDLORD)
      tags:
        - Tenants
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unitId]
              properties:
                unitId: { type: integer }
      responses:
        "200":
          description: Tenant assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      tenant: { $ref: "#/components/schemas/User" }
                      unit: { $ref: "#/components/schemas/Unit" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }

  /tenants/dashboard:
    get:
      summary: Tenant dashboard
      tags:
        - Tenants
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      unit: { $ref: "#/components/schemas/Unit" }
                      invoices: { type: array }
                      payments: { type: array }
                      bookings: { type: array }
                      invoicesCount: { type: integer }
                      bookingsCount: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [ADMIN, LANDLORD, TENANT] }
        managedById: { type: integer, nullable: true }
        unitId: { type: integer, nullable: true }
    Property:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        location: { type: string }
        categoryId: { type: integer }
        description: { type: string }
        landlordId: { type: integer, nullable: true }
    Unit:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        price: { type: number }
        status: { type: string, enum: [available, occupied] }
        size: { type: string }
        description: { type: string }
        propertyId: { type: integer }
    AppError:
      type: object
      properties:
        status: { type: string, example: "fail" }
        message: { type: string }
    AppErrorWithDetails:
      type: object
      properties:
        status: { type: string, example: "fail" }
        message: { type: string }
        details: { type: array, items: { type: string } }

  responses:
    Unauthorized:
      description: Unauthorized (missing/invalid token)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    Forbidden:
      description: Forbidden (wrong role or ownership)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    BadRequest:
      description: Bad request (invalid input)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppErrorWithDetails"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    PropertyCreated:
      description: Property created
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                { type: string, example: "Property created successfully" }
              data: { $ref: "#/components/schemas/Property" }
    UnitCreated:
      description: Unit created
      content:
        application/json:
          schema:
            type: object
            properties:
              message: { type: string, example: "Unit created successfully" }
              data: { $ref: "#/components/schemas/Unit" }
